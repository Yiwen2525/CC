name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show SDK info
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Build for device (unsigned)
        working-directory: MemScan
        run: |
          xcodebuild \
            -project MemScan.xcodeproj \
            -scheme MemScan \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .app bundle
        working-directory: MemScan
        run: |
          APP_PATH=$(find build/DerivedData -name "MemScan.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "MemScan.app not found"
            exit 1
          fi
          mkdir -p build/output
          cp -R "$APP_PATH" build/output/
          cd build/output && zip -r ../MemScan-unsigned.zip MemScan.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemScan-unsigned
          path: MemScan/build/MemScan-unsigned.zip
          retention-days: 14
