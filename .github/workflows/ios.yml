name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build MemScan for iOS device
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Xcode project
        id: locate
        run: |
          if [ -f "MemScan/MemScan.xcodeproj/project.pbxproj" ]; then
            echo "project_dir=MemScan" >> $GITHUB_OUTPUT
            echo "Found project at MemScan/MemScan.xcodeproj"
          elif [ -f "MemScan.xcodeproj/project.pbxproj" ]; then
            echo "project_dir=." >> $GITHUB_OUTPUT
            echo "Found project at MemScan.xcodeproj"
          else
            echo "ERROR: MemScan.xcodeproj not found"
            ls -la
            exit 1
          fi

      - name: Verify project files
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: |
          missing=0
          for f in \
            MemScan/MemScanApp.swift \
            MemScan/ContentView.swift \
            MemScan/Services/ScanSession.swift \
            MemScan/Services/ProcessService.swift \
            MemScan/Bridge/MemScanBridge.m \
            MemScan/MemScan-Bridging-Header.h
          do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "ERROR: Required source files are missing on GitHub."
            echo "Upload the entire MemScan folder, not just Bridge files."
            echo "GitHub web upload often strips <...> from code — use Git instead."
            exit 1
          fi
          echo "All required source files present."

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -list -project "${{ steps.locate.outputs.project_dir }}/MemScan.xcodeproj"

      - name: Build for device (unsigned)
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: |
          set -o pipefail
          xcodebuild \
            -project MemScan.xcodeproj \
            -scheme MemScan \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            build 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "==== BUILD ERRORS ===="
            grep -E "error:|fatal error:" build.log || tail -100 build.log
            exit "$BUILD_STATUS"
          fi

      - name: Package unsigned IPA
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/MemScan.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app not found at $APP_PATH"
            find build/DerivedData -name "MemScan.app" -type d
            tail -80 build.log
            exit 1
          fi
          if [ ! -f "$APP_PATH/MemScan" ]; then
            echo "ERROR: MemScan executable missing inside app bundle"
            ls -la "$APP_PATH"
            tail -80 build.log
            exit 1
          fi
          echo "App bundle contents:"
          ls -la "$APP_PATH"
          file "$APP_PATH/MemScan"
          ENTITLEMENTS="MemScan/MemScan.entitlements"
          if [ ! -f "$ENTITLEMENTS" ]; then
            echo "ERROR: entitlements file missing at $ENTITLEMENTS"
            exit 1
          fi
          if ! command -v ldid >/dev/null 2>&1; then
            brew install ldid
          fi
          ldid -S"$ENTITLEMENTS" "$APP_PATH/MemScan"
          echo "Applied entitlements:"
          ldid -e "$APP_PATH/MemScan" || true
          rm -rf build/Payload build/MemScan-unsigned.ipa
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -qr MemScan-unsigned.ipa Payload
          echo "Packaged: build/MemScan-unsigned.ipa"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemScan-unsigned-ipa
          path: ${{ steps.locate.outputs.project_dir }}/build/MemScan-unsigned.ipa
          retention-days: 14
